<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoDetc - Diskusi Tim</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EmoDetc</h1>
            <p>Emotional Detection Team's</p>
        </header>

        <main>
            <section class="card">
                <h2>Diskusi Tim</h2>
                <div class="chat-container">
                    <div id="chat-messages" class="empty-state">
                        <p><i class="fas fa-comments"></i></p>
                        <p>Belum ada pesan</p>
                        <p>Mulai diskusi dengan tim Anda</p>
                    </div>
                    <form id="chat-form">
                        <div class="form-group">
                            <select id="chat-mood" name="chatMood">
                                <option value="neutral">😐 Netral</option>
                                <option value="happy">😊 Senang</option>
                                <option value="sad">😔 Cemas</option>
                                <option value="angry">😡 Marah</option>
                            </select>
                            <input type="text" id="chat-message" name="message" placeholder="Ketik pesan..." required>
                            <button type="submit" class="btn">Kirim</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="chat.html" class="nav-item active">
                <i class="fas fa-comments"></i>
                <span>Diskusi</span>
            </a>
            <a href="feed.html" class="nav-item">
                <i class="fas fa-stream"></i>
                <span>Feed</span>
            </a>
            <a href="report.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Laporan</span>
            </a>
        </nav>

        <footer>
            <p>&copy; 2025 EmoDetc - Emotional Detection Team's</p>
        </footer>
    </div>

    <script src="js/common.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
