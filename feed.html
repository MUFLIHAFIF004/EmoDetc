<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoDetc - Feed Tim</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EmoDetc</h1>
            <p>Emotional Detection Team's</p>
        </header>

        <main>
            <section class="card">
                <h2>Feed Tim</h2>
                <form id="feed-form">
                    <div class="form-group">
                        <label for="feed-content">Tambahkan Feed:</label>
                        <textarea id="feed-content" name="content" rows="3" placeholder="Bagikan sesuatu dengan tim Anda..." required></textarea>
                    </div>
                    <button type="submit" class="btn primary">Tambahkan Feed</button>
                </form>
                
                <div id="feed-container" class="empty-state">
                    <p><i class="fas fa-stream"></i></p>
                    <p>Belum ada feed</p>
                    <p>Mulai berbagi dengan tim Anda</p>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="chat.html" class="nav-item">
                <i class="fas fa-comments"></i>
                <span>Diskusi</span>
            </a>
            <a href="feed.html" class="nav-item active">
                <i class="fas fa-stream"></i>
                <span>Feed</span>
            </a>
            <a href="history.html" class="nav-item">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </a>
            <a href="report.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Laporan</span>
            </a>
        </nav>

        <footer>
            <p>&copy; 2025 EmoDetc - Emotional Detection Team's</p>
        </footer>
    </div>

    <script src="js/common.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
