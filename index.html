<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoDetc - Cek Mood Harian</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EmoDetc</h1>
            <p>Emotional Detection Team's</p>
        </header>

        <main>
            <section class="card">
                <h2>Cek Mood Harian</h2>
                <form id="mood-form">
                    <div class="form-group">
                        <label for="mood-emoji">Pilih Emoji Mood:</label>
                        <div class="emoji-selector">
                            <span class="emoji" data-emoji="😀">😀</span>
                            <span class="emoji" data-emoji="😊">😊</span>
                            <span class="emoji" data-emoji="😐">😐</span>
                            <span class="emoji" data-emoji="😔">😔</span>
                            <span class="emoji" data-emoji="😡">😡</span>
                        </div>
                        <input type="hidden" id="mood-emoji" name="moodEmoji" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="mood-word">Pilih Kata Emosi:</label>
                        <select id="mood-word" name="moodWord" required>
                            <option value="">-- Pilih Emosi --</option>
                            <option value="senang">Senang</option>
                            <option value="cemas">Cemas</option>
                            <option value="marah">Marah</option>
                            <option value="netral">Netral</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="mood-date">Tanggal:</label>
                        <input type="date" id="mood-date" name="date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="mood-note">Catatan (opsional):</label>
                        <textarea id="mood-note" name="note" rows="3" placeholder="Bagaimana perasaan Anda hari ini?"></textarea>
                    </div>
                    
                    <button type="submit" class="btn primary">Lanjut ke Diskusi</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2025 EmoDetc - Emotional Detection Team's</p>
        </footer>
    </div>

    <script src="js/common.js"></script>
    <script src="js/mood-check.js"></script>
</body>
</html>
